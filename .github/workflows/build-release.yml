name: Build & Release

on:
  push:
    tags:
      - 'v*'          # v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # 也可手动触发
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false

jobs:
  build:
    name: Build APK and create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Fix gradlew permissions
        run: chmod +x android/gradlew

      - name: Build font assets
        run: npm run build:fonts

      - name: Build UI bundle
        run: npm run build:ui

      - name: Build Bare bundle
        run: npm run build:bare

      - name: Set version
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Build Android debug APK
        run: |
          cd android
          ./gradlew assembleDebug
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}

      - name: Set APK name
        id: apk
        run: |
          APK_NAME="pearguard-${GITHUB_REF_NAME}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          echo "name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "size=$(stat -c%s "$APK_NAME")" >> $GITHUB_OUTPUT

      - name: Generate SHA256
        run: |
          sha256sum "pearguard-${GITHUB_REF_NAME}.apk" > "pearguard-${GITHUB_REF_NAME}.apk.sha256"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## PearGuard ${{ github.ref_name }}

            ### 下载
            - [Android APK](pearguard-${{ github.ref_name }}.apk)
            - [SHA256 校验](pearguard-${{ github.ref_name }}.apk.sha256)
          files: |
            pearguard-*.apk
            pearguard-*.apk.sha256
          generate_release_notes: true
